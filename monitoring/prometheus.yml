# ============================================
# Prometheus — Bootcamp GitLab CE
# Monitoreo LOCAL unicamente. Sin envio externo.
# No hay remote_write ni endpoints externos.
# ============================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # GitLab CE metrics (built-in exporter)
  - job_name: 'gitlab'
    metrics_path: '/-/metrics'
    static_configs:
      - targets: ['gitlab:80']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'gitlab-ce'

  # GitLab Runner metrics
  - job_name: 'gitlab-runner'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['gitlab-runner:9252']

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
