# ============================================
# Prometheus — gl-epti Lab
# Monitoreo LOCAL unicamente. Sin envio externo.
# ============================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # gl-epti GitLab CE metrics
  - job_name: 'gl-epti'
    metrics_path: '/-/metrics'
    static_configs:
      - targets: ['gl-epti:80']

  # gl-epti Runner metrics
  - job_name: 'gl-epti-runner'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['gl-epti-runner:9252']

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
