<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <rect width="800" height="280" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="bold" fill="#e24329">Environments y Deployments</text>
  <!-- Branch flow -->
  <rect x="20" y="55" width="120" height="40" rx="6" fill="#16213e" stroke="#554488" stroke-width="1.5"/>
  <text x="80" y="80" text-anchor="middle" font-family="monospace" font-size="11" fill="#554488">develop branch</text>
  <text x="150" y="75" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="170" y="55" width="140" height="40" rx="6" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="240" y="80" text-anchor="middle" font-family="monospace" font-size="11" fill="#fc6d26">Deploy Staging</text>
  <text x="320" y="75" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="340" y="55" width="160" height="40" rx="6" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="420" y="75" text-anchor="middle" font-family="monospace" font-size="11" fill="#a0a0a0">🧪 staging</text>
  <text x="420" y="90" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">https://staging.app.com</text>
  <rect x="20" y="115" width="120" height="40" rx="6" fill="#16213e" stroke="#e24329" stroke-width="1.5"/>
  <text x="80" y="140" text-anchor="middle" font-family="monospace" font-size="11" fill="#e24329">main branch</text>
  <text x="150" y="135" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="170" y="115" width="140" height="40" rx="6" fill="#16213e" stroke="#e24329" stroke-width="1.5"/>
  <text x="240" y="135" text-anchor="middle" font-family="monospace" font-size="11" fill="#e24329">Deploy Prod (manual)</text>
  <text x="320" y="135" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="340" y="115" width="160" height="40" rx="6" fill="#16213e" stroke="#e24329" stroke-width="2"/>
  <text x="420" y="135" text-anchor="middle" font-family="monospace" font-size="11" fill="#e24329">🚀 production</text>
  <text x="420" y="150" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">https://app.com</text>
  <!-- Environment features -->
  <rect x="40" y="180" width="720" height="80" rx="8" fill="#16213e" stroke="#555" stroke-width="1"/>
  <text x="400" y="203" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#7f8c8d">Operate → Environments</text>
  <rect x="60" y="215" width="160" height="30" rx="4" fill="#1a1a2e" stroke="#fc6d26" stroke-width="1"/>
  <text x="140" y="235" text-anchor="middle" font-family="monospace" font-size="9" fill="#fc6d26">📋 Deployment history</text>
  <rect x="235" y="215" width="160" height="30" rx="4" fill="#1a1a2e" stroke="#554488" stroke-width="1"/>
  <text x="315" y="235" text-anchor="middle" font-family="monospace" font-size="9" fill="#554488">⏪ Rollback</text>
  <rect x="410" y="215" width="160" height="30" rx="4" fill="#1a1a2e" stroke="#e24329" stroke-width="1"/>
  <text x="490" y="235" text-anchor="middle" font-family="monospace" font-size="9" fill="#e24329">🔄 auto_stop_in</text>
  <rect x="585" y="215" width="160" height="30" rx="4" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="665" y="235" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">🏷 Review apps (efimeras)</text>
  <text x="400" y="273" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 06</text>
</svg>
