# ============================================
# Practica 02 — Rules Condicionales
# ============================================

stages:
  - build
  - test
  - deploy

# ── Siempre se ejecuta ──
build:
  stage: build
  script:
    - echo "Build ejecutado en ${CI_COMMIT_REF_NAME}"
  rules:
    - when: always

# ── Test rapido (ramas feature) ──
test-rapido:
  stage: test
  script:
    - echo "Ejecutando tests rapidos (smoke tests)..."
    - echo "Branch: ${CI_COMMIT_REF_NAME}"
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^feature\//
    - when: never

# ── Test completo (main o tags) ──
test-completo:
  stage: test
  script:
    - echo "Ejecutando tests completos (unit + integration)..."
    - echo "Commit: ${CI_COMMIT_SHORT_SHA}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v/

# ── Deploy staging (develop) ──
deploy-staging:
  stage: deploy
  script:
    - echo "Desplegando a STAGING..."
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"

