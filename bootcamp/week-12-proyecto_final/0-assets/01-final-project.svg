<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="bold" fill="#e24329">Proyecto Final — Plataforma DevOps Completa</text>
  <!-- Architecture overview -->
  <rect x="20" y="55" width="760" height="110" rx="8" fill="#16213e" stroke="#e24329" stroke-width="1.5"/>
  <text x="400" y="80" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e24329">Infraestructura Docker Compose</text>
  <rect x="40" y="95" width="140" height="50" rx="6" fill="#1a1a2e" stroke="#fc6d26" stroke-width="1"/>
  <text x="110" y="118" text-anchor="middle" font-family="monospace" font-size="11" fill="#fc6d26">GitLab CE</text>
  <text x="110" y="135" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">:80 :443 :2224</text>
  <rect x="200" y="95" width="140" height="50" rx="6" fill="#1a1a2e" stroke="#554488" stroke-width="1"/>
  <text x="270" y="118" text-anchor="middle" font-family="monospace" font-size="11" fill="#554488">Runner</text>
  <text x="270" y="135" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">Docker executor</text>
  <rect x="360" y="95" width="130" height="50" rx="6" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="425" y="118" text-anchor="middle" font-family="monospace" font-size="11" fill="#7f8c8d">Registry</text>
  <text x="425" y="135" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">:5000</text>
  <rect x="510" y="95" width="130" height="50" rx="6" fill="#1a1a2e" stroke="#fc6d26" stroke-width="1"/>
  <text x="575" y="118" text-anchor="middle" font-family="monospace" font-size="11" fill="#fc6d26">Prometheus</text>
  <text x="575" y="135" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">:9090</text>
  <rect x="660" y="95" width="100" height="50" rx="6" fill="#1a1a2e" stroke="#554488" stroke-width="1"/>
  <text x="710" y="118" text-anchor="middle" font-family="monospace" font-size="11" fill="#554488">Grafana</text>
  <text x="710" y="135" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">:3000</text>
  <!-- 4 pillars -->
  <rect x="40" y="185" width="360" height="95" rx="8" fill="#16213e" stroke="#555" stroke-width="1"/>
  <text x="220" y="208" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#7f8c8d">4 Pilares del Proyecto</text>
  <text x="60" y="232" font-family="monospace" font-size="9" fill="#fc6d26">CI/CD</text><text x="110" y="232" font-family="monospace" font-size="9" fill="#a0a0a0">: 5+ stages, templates, environments</text>
  <text x="60" y="250" font-family="monospace" font-size="9" fill="#554488">Security</text><text x="110" y="250" font-family="monospace" font-size="9" fill="#a0a0a0">: SAST, Secret, Container Scan, RBAC, MFA</text>
  <text x="60" y="268" font-family="monospace" font-size="9" fill="#e24329">Monitoring</text><text x="110" y="268" font-family="monospace" font-size="9" fill="#a0a0a0">: Prometheus + Grafana + Alertas</text>
  <text x="60" y="286" font-family="monospace" font-size="9" fill="#7f8c8d">Backup/DR</text><text x="110" y="286" font-family="monospace" font-size="9" fill="#a0a0a0">: Backup diario, restore probado, DR plan</text>
  <rect x="430" y="185" width="330" height="95" rx="8" fill="#16213e" stroke="#e24329" stroke-width="1.5"/>
  <text x="595" y="208" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#e24329">Evaluacion (Nota minima 80%)</text>
  <text x="450" y="232" font-family="monospace" font-size="9" fill="#fc6d26">Infraestructura</text><text x="510" y="232" font-family="monospace" font-size="9" fill="#a0a0a0">: 30%</text>
  <text x="450" y="250" font-family="monospace" font-size="9" fill="#554488">Pipeline CI/CD</text><text x="510" y="250" font-family="monospace" font-size="9" fill="#a0a0a0">: 25%</text>
  <text x="450" y="268" font-family="monospace" font-size="9" fill="#e24329">Seguridad</text><text x="510" y="268" font-family="monospace" font-size="9" fill="#a0a0a0">: 20%</text>
  <text x="450" y="286" font-family="monospace" font-size="9" fill="#7f8c8d">Monitoreo + Docs</text><text x="510" y="286" font-family="monospace" font-size="9" fill="#a0a0a0">: 15% + 10%</text>
  <text x="400" y="293" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 12</text>
</svg>
