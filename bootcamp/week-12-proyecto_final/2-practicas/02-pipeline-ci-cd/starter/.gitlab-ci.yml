# ============================================
# Proyecto Final — Pipeline Completo
# ============================================

stages:
  - build
  - test
  - security
  - package
  - deploy-staging
  - deploy-production

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml

variables:
  IMAGE: ${CI_REGISTRY_IMAGE}/app

# ============================================
# Stage: BUILD
# ============================================
build:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_JOB_TOKEN} ${CI_REGISTRY}
  script:
    - docker build -t ${IMAGE}:${CI_COMMIT_SHORT_SHA} .
    - docker push ${IMAGE}:${CI_COMMIT_SHORT_SHA}
  tags: [docker]

# ============================================
# Stage: TEST
# ============================================
unit-tests:
  stage: test
  image: node:18-alpine
  script:
    - npm ci
    - npm test
  artifacts:
    reports:
      junit: junit.xml

lint:
  stage: test
  image: node:18-alpine
  script:
    - npm run lint
  allow_failure: true

# ============================================
# Stage: SECURITY (via templates)
# ============================================
container-scanning:
  variables:
    CS_IMAGE: ${IMAGE}:${CI_COMMIT_SHORT_SHA}

# ============================================
# Stage: PACKAGE
# ============================================
package:
  stage: package
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_JOB_TOKEN} ${CI_REGISTRY}
  script:
    - docker pull ${IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker tag ${IMAGE}:${CI_COMMIT_SHORT_SHA} ${IMAGE}:${CI_COMMIT_REF_SLUG}
    - docker tag ${IMAGE}:${CI_COMMIT_SHORT_SHA} ${IMAGE}:latest
    - docker push ${IMAGE}:${CI_COMMIT_REF_SLUG}
    - docker push ${IMAGE}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  tags: [docker]

# ============================================
# Stage: DEPLOY STAGING (automatico)
# ============================================
deploy-staging:
  stage: deploy-staging
  image: alpine:latest
  script:
    - echo "Deploy to STAGING"
    - echo "Image: ${IMAGE}:${CI_COMMIT_REF_SLUG}"
  environment:
    name: staging
    url: https://staging.app.local
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ============================================
# Stage: DEPLOY PRODUCTION (manual)
# ============================================
deploy-production:
  stage: deploy-production
  image: alpine:latest
  script:
    - echo "Deploy to PRODUCTION"
    - echo "Image: ${IMAGE}:${CI_COMMIT_TAG}"
  environment:
    name: production
    url: https://app.local
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual
      allow_failure: false
