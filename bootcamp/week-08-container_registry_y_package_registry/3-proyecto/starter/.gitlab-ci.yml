# ============================================
# Proyecto Semana 08 — Pipeline Build+Scan+Publish
# ============================================
stages:
  - build
  - test
  - security
  - publish
  - cleanup

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml

variables:
  IMAGE: ${CI_REGISTRY_IMAGE}/bootcamp-app
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/"

# ── Build ──
docker-build:
  stage: build
  image: docker:24-dind
  services: [docker:24-dind]
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_JOB_TOKEN} ${CI_REGISTRY}
  script:
    - docker build -t ${IMAGE}:${CI_COMMIT_SHORT_SHA} .
    - docker push ${IMAGE}:${CI_COMMIT_SHORT_SHA}
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── Security ──
container-scanning:
  stage: security
  variables:
    CS_IMAGE: ${IMAGE}:${CI_COMMIT_SHORT_SHA}
    CS_SEVERITY_THRESHOLD: "high"
  needs: [docker-build]

# ── Publish image ──
publish-image:
  stage: publish
  image: docker:24-dind
  services: [docker:24-dind]
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_JOB_TOKEN} ${CI_REGISTRY}
  script:
    - docker pull ${IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker tag ${IMAGE}:${CI_COMMIT_SHORT_SHA} ${IMAGE}:${CI_COMMIT_REF_SLUG}
    - docker tag ${IMAGE}:${CI_COMMIT_SHORT_SHA} ${IMAGE}:latest
    - docker push ${IMAGE}:${CI_COMMIT_REF_SLUG}
    - docker push ${IMAGE}:latest
    - echo "Published: ${IMAGE}:${CI_COMMIT_REF_SLUG}, :latest"
  needs: [docker-build, container-scanning]

# ── Publish package (on tag) ──
publish-npm:
  stage: publish
  image: node:18-alpine
  script:
    - echo "@scope:registry=${PACKAGE_REGISTRY_URL}" > .npmrc
    - echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - npm publish --registry=${PACKAGE_REGISTRY_URL}
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ── Cleanup old tags ──
cleanup:
  stage: cleanup
  image: alpine:latest
  before_script:
    - apk add --no-cache curl jq
  script:
    - echo "Cleanup ejecutado (keep last 10 tags)"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  allow_failure: true
