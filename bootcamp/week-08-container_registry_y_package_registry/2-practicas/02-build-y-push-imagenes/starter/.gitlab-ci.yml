# ============================================
# Practica 02 — Docker Build y Push en CI
# ============================================

stages:
  - build
  - publish
  - clean

variables:
  IMAGE_NAME: ${CI_REGISTRY_IMAGE}/bootcamp-app

# ── Build: Docker-in-Docker ──
docker-build:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_JOB_TOKEN} ${CI_REGISTRY}
  script:
    - docker build -t ${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA} .
    - docker tag ${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA} ${IMAGE_NAME}:${CI_COMMIT_REF_SLUG}
    - docker tag ${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA} ${IMAGE_NAME}:latest
    - docker push ${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}
    - docker push ${IMAGE_NAME}:${CI_COMMIT_REF_SLUG}
    - docker push ${IMAGE_NAME}:latest
    - echo "Tags publicados: ${CI_COMMIT_SHORT_SHA}, ${CI_COMMIT_REF_SLUG}, latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# ── Publish: Tag semantico ──
publish-release:
  stage: publish
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_JOB_TOKEN} ${CI_REGISTRY}
  script:
    - docker pull ${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}
    - docker tag ${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA} ${IMAGE_NAME}:${CI_COMMIT_TAG}
    - docker push ${IMAGE_NAME}:${CI_COMMIT_TAG}
    - echo "Release tag publicado: ${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ── Clean: Limpiar tags viejos ──
cleanup-old-tags:
  stage: clean
  image: alpine:latest
  before_script:
    - apk add --no-cache curl jq
  script:
    - echo "Limpiando tags antiguos (keep last 10)..."
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  allow_failure: true
