# ============================================
# Practica 03 — Package Registry (npm)
# ============================================

stages:
  - test
  - publish

variables:
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/"

# ── Test ──
test:
  stage: test
  image: node:18-alpine
  script:
    - npm ci
    - npm test
  rules:
    - when: always

# ── Publish npm package ──
publish-npm:
  stage: publish
  image: node:18-alpine
  script:
    # Configurar scope y autenticacion
    - echo "@${CI_PROJECT_ROOT_NAMESPACE}:registry=${PACKAGE_REGISTRY_URL}" > .npmrc
    - echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - cat .npmrc  # Verificar (token enmascarado)
    # Publicar
    - npm publish --registry=${PACKAGE_REGISTRY_URL}
    - echo "Paquete npm publicado!"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

