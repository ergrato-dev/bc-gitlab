<svg xmlns="http://www.w3.org/2000/svg" width="800" height="330" viewBox="0 0 800 330">
  <rect width="800" height="330" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="bold" fill="#e24329">Package Registry — Formatos Soportados</text>
  <!-- Format cards -->
  <rect x="20" y="55" width="175" height="70" rx="6" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="107" y="80" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#fc6d26">npm</text>
  <text x="107" y="98" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">JavaScript/Node.js</text>
  <text x="107" y="114" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">npm publish</text>
  <rect x="205" y="55" width="175" height="70" rx="6" fill="#16213e" stroke="#554488" stroke-width="1.5"/>
  <text x="292" y="80" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#554488">Maven</text>
  <text x="292" y="98" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">Java / Kotlin</text>
  <text x="292" y="114" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">mvn deploy</text>
  <rect x="390" y="55" width="175" height="70" rx="6" fill="#16213e" stroke="#e24329" stroke-width="1.5"/>
  <text x="477" y="80" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#e24329">PyPI</text>
  <text x="477" y="98" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">Python</text>
  <text x="477" y="114" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">twine upload</text>
  <rect x="575" y="55" width="205" height="70" rx="6" fill="#16213e" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="677" y="80" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#7f8c8d">NuGet</text>
  <text x="677" y="98" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">.NET</text>
  <text x="677" y="114" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">dotnet push</text>
  <!-- More formats -->
  <rect x="20" y="140" width="110" height="35" rx="4" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="75" y="162" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">Conan (C++)</text>
  <rect x="140" y="140" width="110" height="35" rx="4" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="195" y="162" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">Composer (PHP)</text>
  <rect x="260" y="140" width="110" height="35" rx="4" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="315" y="162" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">Helm (K8s)</text>
  <rect x="380" y="140" width="110" height="35" rx="4" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="435" y="162" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">Generic (API)</text>
  <rect x="500" y="140" width="140" height="35" rx="4" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="570" y="162" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">Terraform Module</text>
  <!-- npm example -->
  <rect x="60" y="200" width="680" height="110" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="1"/>
  <text x="400" y="223" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fc6d26">Ejemplo: Publicar Paquete npm en CI</text>
  <text x="80" y="248" font-family="monospace" font-size="9" fill="#a0a0a0">1. Configurar scope en package.json: "@scope"</text>
  <text x="80" y="265" font-family="monospace" font-size="9" fill="#a0a0a0">2. Crear .npmrc con auth: echo "@scope:registry=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/" &gt; .npmrc</text>
  <text x="80" y="282" font-family="monospace" font-size="9" fill="#a0a0a0">3. Autenticar: echo "//${CI_SERVER_HOST}/api/v4/projects/$CI_PROJECT_ID/packages/npm/:_authToken=${CI_JOB_TOKEN}" &gt;&gt; .npmrc</text>
  <text x="80" y="299" font-family="monospace" font-size="9" fill="#a0a0a0">4. Publicar: npm publish --registry=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/</text>
  <text x="400" y="323" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 08</text>
</svg>
