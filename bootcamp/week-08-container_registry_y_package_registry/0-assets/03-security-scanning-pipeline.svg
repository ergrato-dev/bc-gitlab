<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <rect width="800" height="280" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="bold" fill="#e24329">Security Scanning en Pipeline CI/CD</text>
  <!-- Pipeline stages -->
  <rect x="20" y="55" width="120" height="40" rx="6" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="80" y="80" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fc6d26">build</text>
  <text x="148" y="75" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="165" y="55" width="120" height="40" rx="6" fill="#16213e" stroke="#554488" stroke-width="1.5"/>
  <text x="225" y="80" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#554488">test</text>
  <text x="293" y="75" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="310" y="55" width="160" height="40" rx="6" fill="#16213e" stroke="#e24329" stroke-width="2"/>
  <text x="390" y="80" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#e24329">security</text>
  <text x="478" y="75" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="495" y="55" width="120" height="40" rx="6" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="555" y="80" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fc6d26">publish</text>
  <text x="623" y="75" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="640" y="55" width="140" height="40" rx="6" fill="#16213e" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="710" y="80" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#7f8c8d">cleanup</text>
  <!-- Security jobs -->
  <rect x="30" y="120" width="740" height="140" rx="8" fill="#16213e" stroke="#555" stroke-width="1"/>
  <text x="400" y="143" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e24329">Stage: security (jobs en paralelo)</text>
  <rect x="50" y="158" width="160" height="40" rx="4" fill="#1a1a2e" stroke="#fc6d26" stroke-width="1"/>
  <text x="130" y="178" text-anchor="middle" font-family="monospace" font-size="10" fill="#fc6d26">SAST</text>
  <text x="130" y="193" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">Codigo fuente</text>
  <rect x="225" y="158" width="160" height="40" rx="4" fill="#1a1a2e" stroke="#554488" stroke-width="1"/>
  <text x="305" y="178" text-anchor="middle" font-family="monospace" font-size="10" fill="#554488">Secret Detection</text>
  <text x="305" y="193" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">API keys / tokens</text>
  <rect x="400" y="158" width="160" height="40" rx="4" fill="#1a1a2e" stroke="#e24329" stroke-width="1"/>
  <text x="480" y="178" text-anchor="middle" font-family="monospace" font-size="10" fill="#e24329">Dependency Scan</text>
  <text x="480" y="193" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">npm / Maven / pip</text>
  <rect x="575" y="158" width="175" height="40" rx="4" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="662" y="178" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">Container Scan</text>
  <text x="662" y="193" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">Imagenes Docker (Trivy)</text>
  <text x="400" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">include: template: Security/SAST.gitlab-ci.yml, template: Security/Secret-Detection.gitlab-ci.yml, ...</text>
  <text x="400" y="245" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">Reports → MR Widget | Security Dashboard | Vulnerability Report</text>
  <text x="400" y="273" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 08</text>
</svg>
