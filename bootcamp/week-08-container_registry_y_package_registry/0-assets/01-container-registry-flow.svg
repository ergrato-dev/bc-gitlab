<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="bold" fill="#e24329">Container Registry — Flujo Build → Tag → Push → Pull</text>
  <!-- Flow -->
  <rect x="20" y="55" width="150" height="50" rx="6" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="95" y="78" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fc6d26">Dockerfile</text>
  <text x="95" y="95" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">FROM node:18</text>
  <text x="178" y="80" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="195" y="55" width="150" height="50" rx="6" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="270" y="78" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fc6d26">docker build</text>
  <text x="270" y="95" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">-t registry/name:tag</text>
  <text x="353" y="80" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="370" y="55" width="150" height="50" rx="6" fill="#16213e" stroke="#e24329" stroke-width="2"/>
  <text x="445" y="78" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#e24329">docker push</text>
  <text x="445" y="95" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">→ Container Registry</text>
  <text x="528" y="80" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="545" y="55" width="150" height="50" rx="6" fill="#16213e" stroke="#554488" stroke-width="1.5"/>
  <text x="620" y="78" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#554488">docker pull</text>
  <text x="620" y="95" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">deploy en produccion</text>
  <!-- Tags strategy -->
  <rect x="40" y="130" width="720" height="105" rx="8" fill="#16213e" stroke="#555" stroke-width="1"/>
  <text x="400" y="155" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#7f8c8d">Estrategia de Versionado de Imagenes</text>
  <rect x="60" y="170" width="155" height="45" rx="4" fill="#1a1a2e" stroke="#fc6d26" stroke-width="1"/>
  <text x="137" y="190" text-anchor="middle" font-family="monospace" font-size="10" fill="#fc6d26">${CI_COMMIT_SHA}</text>
  <text x="137" y="207" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">Inmutable (audit)</text>
  <rect x="235" y="170" width="155" height="45" rx="4" fill="#1a1a2e" stroke="#554488" stroke-width="1"/>
  <text x="312" y="190" text-anchor="middle" font-family="monospace" font-size="10" fill="#554488">${CI_COMMIT_REF_SLUG}</text>
  <text x="312" y="207" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">Rama (dev/staging)</text>
  <rect x="410" y="170" width="155" height="45" rx="4" fill="#1a1a2e" stroke="#e24329" stroke-width="1"/>
  <text x="487" y="190" text-anchor="middle" font-family="monospace" font-size="10" fill="#e24329">${CI_COMMIT_TAG}</text>
  <text x="487" y="207" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">SemVer (v1.2.3)</text>
  <rect x="585" y="170" width="155" height="45" rx="4" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="662" y="190" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">latest</text>
  <text x="662" y="207" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">Movible (ultimo)</text>
  <!-- Build methods -->
  <rect x="40" y="260" width="720" height="95" rx="8" fill="#16213e" stroke="#555" stroke-width="1"/>
  <text x="400" y="283" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#7f8c8d">Metodos de Build en CI</text>
  <rect x="60" y="300" width="210" height="40" rx="4" fill="#1a1a2e" stroke="#fc6d26" stroke-width="1"/>
  <text x="165" y="318" text-anchor="middle" font-family="monospace" font-size="10" fill="#fc6d26">DIND</text><text x="165" y="333" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">privileged | completo</text>
  <rect x="290" y="300" width="210" height="40" rx="4" fill="#1a1a2e" stroke="#554488" stroke-width="1"/>
  <text x="395" y="318" text-anchor="middle" font-family="monospace" font-size="10" fill="#554488">Kaniko ★</text><text x="395" y="333" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">rootless | cache registry</text>
  <rect x="520" y="300" width="220" height="40" rx="4" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="630" y="318" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">Buildah</text><text x="630" y="333" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">rootless OCI | sin daemon</text>
  <text x="400" y="372" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 08</text>
</svg>
