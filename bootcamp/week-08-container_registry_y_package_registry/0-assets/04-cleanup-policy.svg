<svg xmlns="http://www.w3.org/2000/svg" width="800" height="240" viewBox="0 0 800 240">
  <rect width="800" height="240" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="bold" fill="#e24329">Tag Cleanup Policy — Gestion de Imagenes</text>
  <!-- Problem -->
  <rect x="20" y="55" width="355" height="70" rx="6" fill="#16213e" stroke="#c0392b" stroke-width="1.5"/>
  <text x="197" y="78" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#c0392b">Sin limpieza</text>
  <text x="197" y="98" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">Cada commit → nueva imagen</text>
  <text x="197" y="115" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">1000+ tags en 1 mes → almacenamiento $$$</text>
  <text x="383" y="90" font-family="monospace" font-size="16" fill="#e24329">→</text>
  <!-- Solution -->
  <rect x="420" y="55" width="360" height="70" rx="6" fill="#16213e" stroke="#e24329" stroke-width="2"/>
  <text x="600" y="78" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#e24329">Con Cleanup Policy</text>
  <text x="600" y="98" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">Keep most recent: 10 tags</text>
  <text x="600" y="115" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">Keep tags matching: v* (releases)</text>
  <!-- Policy config -->
  <rect x="40" y="150" width="720" height="70" rx="8" fill="#16213e" stroke="#555" stroke-width="1"/>
  <text x="400" y="173" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#7f8c8d">Settings → Packages &amp; Registries → Cleanup policies</text>
  <text x="400" y="195" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">Keep most recent: 5 tags per image | Keep tags matching: v* | Remove tags older than: 90 days</text>
  <text x="400" y="212" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">Ejecutar: Manual o programado | Solo tags que no estan referenciados</text>
  <text x="400" y="233" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 08</text>
</svg>
