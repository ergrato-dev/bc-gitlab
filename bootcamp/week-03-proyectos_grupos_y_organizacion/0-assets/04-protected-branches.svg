<svg xmlns="http://www.w3.org/2000/svg" width="800" height="250" viewBox="0 0 800 250">
  <rect width="800" height="250" fill="#1a1a2e"/>
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e24329">Protected Branches — Flujo con Proteccion</text>

  <!-- Developer push attempt -->
  <rect x="20" y="60" width="170" height="70" rx="8" fill="#16213e" stroke="#c0392b" stroke-width="1.5"/>
  <text x="105" y="85" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#c0392b">Developer</text>
  <text x="105" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#c0392b">git push origin main</text>
  <text x="105" y="122" text-anchor="middle" font-family="monospace" font-size="10" fill="#c0392b">✗ RECHAZADO</text>

  <text x="200" y="98" text-anchor="middle" font-family="monospace" font-size="16" fill="#555">→</text>

  <!-- MR flow -->
  <rect x="225" y="60" width="170" height="70" rx="8" fill="#16213e" stroke="#554488" stroke-width="1.5"/>
  <text x="310" y="85" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#554488">Developer</text>
  <text x="310" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#554488">push feature/xyz</text>
  <text x="310" y="122" text-anchor="middle" font-family="monospace" font-size="10" fill="#554488">Crear MR → main</text>

  <text x="405" y="98" text-anchor="middle" font-family="monospace" font-size="16" fill="#555">→</text>

  <!-- Reviewer -->
  <rect x="430" y="60" width="170" height="70" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="515" y="85" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fc6d26">Maintainer</text>
  <text x="515" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#fc6d26">Code Review</text>
  <text x="515" y="122" text-anchor="middle" font-family="monospace" font-size="10" fill="#fc6d26">Approve MR</text>

  <text x="610" y="98" text-anchor="middle" font-family="monospace" font-size="16" fill="#555">→</text>

  <!-- Merge -->
  <rect x="635" y="60" width="145" height="70" rx="8" fill="#16213e" stroke="#e24329" stroke-width="2"/>
  <text x="707" y="85" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#e24329">Merge a main</text>
  <text x="707" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#e24329">✓ Aceptado</text>
  <text x="707" y="122" text-anchor="middle" font-family="monospace" font-size="10" fill="#e24329">✓ Pipeline OK</text>

  <!-- Role summary -->
  <rect x="60" y="160" width="680" height="70" rx="8" fill="#16213e" stroke="#555" stroke-width="1"/>
  <text x="400" y="185" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#7f8c8d">Protected Branch Rules (main)</text>
  <text x="130" y="212" text-anchor="middle" font-family="monospace" font-size="11" fill="#c0392b">Push: Nobody</text>
  <text x="340" y="212" text-anchor="middle" font-family="monospace" font-size="11" fill="#fc6d26">Merge: Maintainers</text>
  <text x="570" y="212" text-anchor="middle" font-family="monospace" font-size="11" fill="#554488">Code Owner: required</text>
  <text x="730" y="212" text-anchor="middle" font-family="monospace" font-size="11" fill="#e24329">Pipelines must succeed</text>

  <text x="400" y="243" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 03</text>
</svg>
