<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e24329">Jerarquia de Grupos, Subgrupos y Proyectos</text>

  <!-- Root Group -->
  <rect x="280" y="55" width="240" height="45" rx="8" fill="#16213e" stroke="#e24329" stroke-width="2.5"/>
  <text x="400" y="78" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#e24329">🏢 technova/</text>
  <text x="400" y="93" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">Owner: root | Visibility: Private</text>

  <!-- Lines down -->
  <line x1="340" y1="100" x2="180" y2="135" stroke="#fc6d26" stroke-width="1.5"/>
  <line x1="400" y1="100" x2="400" y2="135" stroke="#fc6d26" stroke-width="1.5"/>
  <line x1="460" y1="100" x2="620" y2="135" stroke="#fc6d26" stroke-width="1.5"/>

  <!-- Subgroup: orion -->
  <rect x="60" y="135" width="230" height="50" rx="6" fill="#16213e" stroke="#fc6d26" stroke-width="1.8"/>
  <text x="175" y="158" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#fc6d26">orion/ (Frontend)</text>
  <text x="175" y="176" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">3 Developers + 1 Maintainer</text>

  <!-- Subgroup: vega -->
  <rect x="290" y="135" width="220" height="50" rx="6" fill="#16213e" stroke="#fc6d26" stroke-width="1.8"/>
  <text x="400" y="158" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#fc6d26">vega/ (Backend)</text>
  <text x="400" y="176" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">4 Developers + 1 Maintainer</text>

  <!-- Subgroup: nexus -->
  <rect x="520" y="135" width="220" height="50" rx="6" fill="#16213e" stroke="#fc6d26" stroke-width="1.8"/>
  <text x="630" y="158" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#fc6d26">nexus/ (DevOps)</text>
  <text x="630" y="176" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">2 Developers + 1 Maintainer</text>

  <!-- Lines to projects -->
  <line x1="105" y1="185" x2="105" y2="215" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="250" y1="185" x2="250" y2="215" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="345" y1="185" x2="345" y2="215" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="455" y1="185" x2="455" y2="215" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="575" y1="185" x2="575" y2="215" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="685" y1="185" x2="685" y2="215" stroke="#7f8c8d" stroke-width="1"/>

  <!-- Projects -->
  <rect x="30" y="215" width="150" height="35" rx="4" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="105" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">storefront</text>
  <rect x="175" y="215" width="150" height="35" rx="4" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="250" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">admin-panel</text>
  <rect x="270" y="215" width="150" height="35" rx="4" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="345" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">product-service</text>
  <rect x="380" y="215" width="150" height="35" rx="4" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="455" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">order-service</text>
  <rect x="500" y="215" width="150" height="35" rx="4" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="575" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">infrastructure</text>
  <rect x="610" y="215" width="150" height="35" rx="4" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="685" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">ci-cd-config</text>

  <!-- Herencia -->
  <rect x="40" y="275" width="720" height="85" rx="8" fill="#16213e" stroke="#554488" stroke-width="1"/>
  <text x="400" y="300" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#554488">Herencia de Permisos</text>
  <text x="400" y="322" text-anchor="middle" font-family="monospace" font-size="11" fill="#a0a0a0">Miembros de technova (Owner/Maintainer/Developer) heredan acceso a subgrupos y proyectos</text>
  <text x="400" y="342" text-anchor="middle" font-family="monospace" font-size="11" fill="#a0a0a0">Permisos fluyen ↓ (padre → hijo). No se pueden reducir, solo ampliar.</text>

  <text x="400" y="372" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 03</text>
</svg>
