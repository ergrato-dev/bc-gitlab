<svg xmlns="http://www.w3.org/2000/svg" width="800" height="250" viewBox="0 0 800 250">
  <rect width="800" height="250" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="bold" fill="#e24329">Gitaly Cluster — HA para Repositorios Git</text>
  <!-- Architecture -->
  <rect x="40" y="55" width="190" height="50" rx="6" fill="#16213e" stroke="#e24329" stroke-width="1.5"/>
  <text x="135" y="78" text-anchor="middle" font-family="monospace" font-size="11" fill="#e24329">GitLab Rails/Shell</text>
  <text x="135" y="95" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">Clientes gRPC</text>
  <!-- Arrow to Praefect -->
  <text x="238" y="80" font-family="monospace" font-size="14" fill="#555">→</text>
  <!-- Praefect -->
  <rect x="260" y="55" width="170" height="50" rx="6" fill="#16213e" stroke="#fc6d26" stroke-width="2"/>
  <text x="345" y="78" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fc6d26">Praefect (Proxy)</text>
  <text x="345" y="95" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">Enrutamiento + replicacion</text>
  <!-- Lines to Gitaly nodes -->
  <line x1="345" y1="105" x2="190" y2="150" stroke="#554488" stroke-width="1.5"/>
  <line x1="345" y1="105" x2="345" y2="150" stroke="#554488" stroke-width="1.5"/>
  <line x1="345" y1="105" x2="500" y2="150" stroke="#554488" stroke-width="1.5"/>
  <!-- Gitaly nodes -->
  <rect x="80" y="150" width="220" height="45" rx="6" fill="#16213e" stroke="#554488" stroke-width="1.5"/>
  <text x="190" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#554488">Gitaly Node 1 (primario)</text>
  <text x="190" y="187" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">Replication Factor: 3</text>
  <rect x="80" y="200" width="220" height="40" rx="6" fill="#16213e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="190" y="220" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">PostgreSQL (metadata)</text>
  <text x="190" y="237" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">Storage de repositorios</text>
  <!-- Gitaly Node 2 -->
  <rect x="330" y="150" width="220" height="45" rx="6" fill="#16213e" stroke="#554488" stroke-width="1.5"/>
  <text x="440" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#554488">Gitaly Node 2 (secundario)</text>
  <text x="440" y="187" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">Replica sincronizada</text>
  <!-- Gitaly Node 3 -->
  <rect x="560" y="150" width="220" height="45" rx="6" fill="#16213e" stroke="#554488" stroke-width="1.5"/>
  <text x="670" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#554488">Gitaly Node 3 (secundario)</text>
  <text x="670" y="187" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">Replica sincronizada</text>
  <text x="400" y="243" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 11</text>
</svg>
