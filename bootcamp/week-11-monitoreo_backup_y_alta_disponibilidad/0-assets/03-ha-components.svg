<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <rect width="800" height="320" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="bold" fill="#e24329">Alta Disponibilidad — Componentes y SPOFs</text>
  <!-- SPOF table -->
  <rect x="20" y="55" width="380" height="245" rx="8" fill="#16213e" stroke="#c0392b" stroke-width="1.5"/>
  <text x="210" y="80" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#c0392b">Single Node (SPOFs)</text>
  <text x="40" y="108" font-family="monospace" font-size="10" fill="#c0392b">✗</text><text x="60" y="108" font-family="monospace" font-size="10" fill="#a0a0a0">Nginx — unico punto de entrada</text>
  <text x="40" y="128" font-family="monospace" font-size="10" fill="#c0392b">✗</text><text x="60" y="128" font-family="monospace" font-size="10" fill="#a0a0a0">Puma — unico proceso Rails</text>
  <text x="40" y="148" font-family="monospace" font-size="10" fill="#c0392b">✗</text><text x="60" y="148" font-family="monospace" font-size="10" fill="#a0a0a0">PostgreSQL — caida = todo offline</text>
  <text x="40" y="168" font-family="monospace" font-size="10" fill="#c0392b">✗</text><text x="60" y="168" font-family="monospace" font-size="10" fill="#a0a0a0">Redis — cache y colas perdidas</text>
  <text x="40" y="188" font-family="monospace" font-size="10" fill="#c0392b">✗</text><text x="60" y="188" font-family="monospace" font-size="10" fill="#a0a0a0">Gitaly — repositorios offline</text>
  <text x="40" y="208" font-family="monospace" font-size="10" fill="#c0392b">✗</text><text x="60" y="208" font-family="monospace" font-size="10" fill="#a0a0a0">Sidekiq — jobs estancados</text>
  <!-- HA solutions -->
  <rect x="430" y="55" width="350" height="245" rx="8" fill="#16213e" stroke="#e24329" stroke-width="2"/>
  <text x="605" y="80" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e24329">HA Solutions</text>
  <text x="450" y="108" font-family="monospace" font-size="10" fill="#e24329">✓</text><text x="470" y="108" font-family="monospace" font-size="10" fill="#a0a0a0">HAProxy/Nginx + keepalived (VIP)</text>
  <text x="450" y="128" font-family="monospace" font-size="10" fill="#e24329">✓</text><text x="470" y="128" font-family="monospace" font-size="10" fill="#a0a0a0">Puma x 2-3 nodos + balanceador</text>
  <text x="450" y="148" font-family="monospace" font-size="10" fill="#e24329">✓</text><text x="470" y="148" font-family="monospace" font-size="10" fill="#a0a0a0">Patroni x 3 + etcd + PgBouncer</text>
  <text x="450" y="168" font-family="monospace" font-size="10" fill="#e24329">✓</text><text x="470" y="168" font-family="monospace" font-size="10" fill="#a0a0a0">Redis Sentinel x 3</text>
  <text x="450" y="188" font-family="monospace" font-size="10" fill="#e24329">✓</text><text x="470" y="188" font-family="monospace" font-size="10" fill="#a0a0a0">Gitaly Cluster (Praefect + 3 nodes)</text>
  <text x="450" y="208" font-family="monospace" font-size="10" fill="#e24329">✓</text><text x="470" y="208" font-family="monospace" font-size="10" fill="#a0a0a0">Sidekiq x 2+ nodos</text>
  <!-- RTO/RPO -->
  <rect x="450" y="230" width="310" height="55" rx="5" fill="#1a1a2e" stroke="#fc6d26" stroke-width="1"/>
  <text x="605" y="250" text-anchor="middle" font-family="monospace" font-size="10" fill="#fc6d26">RTO: &lt; 5 min | RPO: ~ 0 (WAL archiving)</text>
  <text x="605" y="270" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">Mínimo 7 nodos | Red privada &lt; 1ms</text>
  <text x="400" y="313" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 11</text>
</svg>
