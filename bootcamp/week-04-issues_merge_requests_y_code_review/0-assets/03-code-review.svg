<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <rect width="800" height="320" fill="#1a1a2e"/>
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e24329">Code Review — Proceso y Mejores Practicas</text>
  <!-- Author side -->
  <rect x="20" y="55" width="200" height="65" rx="8" fill="#16213e" stroke="#554488" stroke-width="1.5"/>
  <text x="120" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#554488">Autor</text>
  <text x="120" y="97" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">1. Crear MR pequeno (&lt;400L)</text>
  <text x="120" y="112" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">2. Descripcion clara</text>
  <text x="120" y="127" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">3. Commits atomicos</text>
  <!-- Reviewer side -->
  <rect x="260" y="55" width="200" height="65" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="360" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fc6d26">Revisor</text>
  <text x="360" y="97" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">1. Revisar logica, seguridad</text>
  <text x="360" y="112" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">2. Comentarios especificos</text>
  <text x="360" y="127" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">3. Sugerencias constructivas</text>
  <!-- Flow arrows -->
  <text x="230" y="88" font-family="monospace" font-size="16" fill="#555">→</text>
  <text x="470" y="88" font-family="monospace" font-size="16" fill="#555">→</text>
  <!-- Review tools -->
  <rect x="530" y="55" width="250" height="65" rx="8" fill="#16213e" stroke="#e24329" stroke-width="1.5"/>
  <text x="655" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e24329">Herramientas GitLab</text>
  <text x="655" y="97" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">· Inline comments (linea especifica)</text>
  <text x="655" y="112" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">· Suggested Changes (apply 1 click)</text>
  <text x="655" y="127" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">· Review Summary (approve/request)</text>
  <!-- Review results -->
  <rect x="20" y="145" width="760" height="155" rx="8" fill="#16213e" stroke="#555" stroke-width="1"/>
  <text x="400" y="170" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#7f8c8d">Que revisar — Checklist del Revisor</text>
  <rect x="40" y="185" width="230" height="50" rx="5" fill="#1a1a2e" stroke="#fc6d26" stroke-width="1"/>
  <text x="155" y="205" text-anchor="middle" font-family="monospace" font-size="10" fill="#fc6d26">Seguridad</text>
  <text x="155" y="222" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">SQL injection, XSS, hardcoded secrets</text>
  <rect x="290" y="185" width="230" height="50" rx="5" fill="#1a1a2e" stroke="#554488" stroke-width="1"/>
  <text x="405" y="205" text-anchor="middle" font-family="monospace" font-size="10" fill="#554488">Logica y Rendimiento</text>
  <text x="405" y="222" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">N+1 queries, bucles, errores no manejados</text>
  <rect x="540" y="185" width="225" height="50" rx="5" fill="#1a1a2e" stroke="#e24329" stroke-width="1"/>
  <text x="652" y="205" text-anchor="middle" font-family="monospace" font-size="10" fill="#e24329">Calidad y Estilo</text>
  <text x="652" y="222" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">Naming, DRY, tests, documentacion</text>
  <rect x="40" y="248" width="720" height="38" rx="5" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="400" y="272" text-anchor="middle" font-family="monospace" font-size="11" fill="#a0a0a0">✓ Bien: "Considera usar async/await para legibilidad"  |  ✗ Mal: "Esto esta mal, no uses .then()"</text>
  <text x="400" y="312" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 04</text>
</svg>
