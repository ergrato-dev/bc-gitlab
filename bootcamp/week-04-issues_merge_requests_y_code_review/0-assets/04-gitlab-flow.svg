<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#1a1a2e"/>
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e24329">GitLab Flow — Issue → Merge → Deploy</text>
  <!-- Flow -->
  <rect x="20" y="60" width="120" height="50" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="80" y="82" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fc6d26">Issue</text>
  <text x="80" y="98" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">~feature #42</text>
  <text x="148" y="85" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="165" y="60" width="120" height="50" rx="8" fill="#16213e" stroke="#554488" stroke-width="1.5"/>
  <text x="225" y="82" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#554488">Branch</text>
  <text x="225" y="98" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">42-user-profile</text>
  <text x="293" y="85" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="310" y="60" width="120" height="50" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="370" y="82" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fc6d26">MR (Draft)</text>
  <text x="370" y="98" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">Draft: feat...</text>
  <text x="438" y="85" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="455" y="60" width="120" height="50" rx="8" fill="#16213e" stroke="#554488" stroke-width="1.5"/>
  <text x="515" y="82" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#554488">Review + CI</text>
  <text x="515" y="98" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">✓ pipeline green</text>
  <text x="583" y="85" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="600" y="60" width="180" height="50" rx="8" fill="#16213e" stroke="#e24329" stroke-width="2"/>
  <text x="690" y="82" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#e24329">Merge → main</text>
  <text x="690" y="98" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">Squash &amp; Merge | Closes #42</text>
  <!-- Environment branches -->
  <line x1="690" y1="110" x2="690" y2="145" stroke="#fc6d26" stroke-width="1.5"/>
  <rect x="600" y="145" width="180" height="45" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="690" y="165" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fc6d26">main → staging MR</text>
  <text x="690" y="180" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">Deploy to staging</text>
  <line x1="690" y1="190" x2="690" y2="220" stroke="#e24329" stroke-width="1.5"/>
  <rect x="600" y="220" width="180" height="45" rx="8" fill="#16213e" stroke="#e24329" stroke-width="2"/>
  <text x="690" y="240" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#e24329">staging → prod MR</text>
  <text x="690" y="255" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">Deploy to production ✓</text>
  <!-- Sidebar: branches -->
  <rect x="20" y="145" width="160" height="120" rx="8" fill="#16213e" stroke="#555" stroke-width="1"/>
  <text x="100" y="168" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#7f8c8d">Environment Branches</text>
  <line x1="35" y1="175" x2="165" y2="175" stroke="#555" stroke-width="0.5"/>
  <circle cx="60" cy="195" r="6" fill="#e24329"/>
  <text x="75" y="199" font-family="monospace" font-size="10" fill="#e24329">production ◎</text>
  <text x="75" y="212" font-family="monospace" font-size="8" fill="#7f8c8d">merge: Maintainers only</text>
  <circle cx="60" cy="230" r="6" fill="#fc6d26"/>
  <text x="75" y="234" font-family="monospace" font-size="10" fill="#fc6d26">staging ◉</text>
  <circle cx="60" cy="250" r="6" fill="#554488"/>
  <text x="75" y="254" font-family="monospace" font-size="10" fill="#554488">main ●</text>
  <text x="400" y="292" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 04</text>
</svg>
