<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <rect width="800" height="280" fill="#1a1a2e"/>
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e24329">Ciclo de Vida de un Issue</text>
  <!-- Flow -->
  <rect x="20" y="60" width="130" height="50" rx="8" fill="#16213e" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="85" y="80" text-anchor="middle" font-family="monospace" font-size="11" fill="#7f8c8d">New Issue</text>
  <text x="85" y="97" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">~workflow::todo</text>
  <text x="160" y="85" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="180" y="60" width="130" height="50" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="245" y="80" text-anchor="middle" font-family="monospace" font-size="11" fill="#fc6d26">Assigned</text>
  <text x="245" y="97" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">/assign @dev</text>
  <text x="320" y="85" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="340" y="60" width="130" height="50" rx="8" fill="#16213e" stroke="#554488" stroke-width="1.5"/>
  <text x="405" y="80" text-anchor="middle" font-family="monospace" font-size="11" fill="#554488">In Progress</text>
  <text x="405" y="97" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">~workflow::in-progress</text>
  <text x="480" y="85" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="500" y="60" width="130" height="50" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="565" y="80" text-anchor="middle" font-family="monospace" font-size="11" fill="#fc6d26">In Review</text>
  <text x="565" y="97" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">MR created</text>
  <text x="640" y="85" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="660" y="60" width="120" height="50" rx="8" fill="#16213e" stroke="#e24329" stroke-width="2"/>
  <text x="720" y="80" text-anchor="middle" font-family="monospace" font-size="11" fill="#e24329">Closed</text>
  <text x="720" y="97" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">Closes #ID</text>
  <!-- Anatomy -->
  <rect x="60" y="140" width="680" height="120" rx="8" fill="#16213e" stroke="#555" stroke-width="1"/>
  <text x="400" y="163" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#7f8c8d">Anatomia de un Issue</text>
  <text x="100" y="190" font-family="monospace" font-size="10" fill="#e24329">Title</text><text x="160" y="190" font-family="monospace" font-size="10" fill="#a0a0a0">: "Implementar pagina de perfil"</text>
  <text x="100" y="207" font-family="monospace" font-size="10" fill="#fc6d26">Labels</text><text x="160" y="207" font-family="monospace" font-size="10" fill="#a0a0a0">: ~feature ~frontend ~priority::2</text>
  <text x="100" y="224" font-family="monospace" font-size="10" fill="#554488">Milestone</text><text x="160" y="224" font-family="monospace" font-size="10" fill="#a0a0a0">: Sprint 1</text>
  <text x="100" y="241" font-family="monospace" font-size="10" fill="#7f8c8d">Assignee</text><text x="160" y="241" font-family="monospace" font-size="10" fill="#a0a0a0">: @developer1</text>
  <text x="420" y="190" font-family="monospace" font-size="10" fill="#e24329">Weight</text><text x="480" y="190" font-family="monospace" font-size="10" fill="#a0a0a0">: 3</text>
  <text x="420" y="207" font-family="monospace" font-size="10" fill="#fc6d26">Due Date</text><text x="480" y="207" font-family="monospace" font-size="10" fill="#a0a0a0">: 2025-07-15</text>
  <text x="420" y="224" font-family="monospace" font-size="10" fill="#554488">Confidential</text><text x="480" y="224" font-family="monospace" font-size="10" fill="#a0a0a0">: false</text>
  <text x="420" y="241" font-family="monospace" font-size="10" fill="#7f8c8d">Epic/Linked</text><text x="480" y="241" font-family="monospace" font-size="10" fill="#a0a0a0">: Related #12</text>
  <text x="400" y="272" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 04</text>
</svg>
