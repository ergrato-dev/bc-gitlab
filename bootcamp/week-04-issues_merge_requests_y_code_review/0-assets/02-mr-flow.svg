<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e24329">Ciclo de Vida de un Merge Request</text>
  <!-- Flow -->
  <rect x="20" y="55" width="130" height="45" rx="8" fill="#16213e" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="85" y="75" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#7f8c8d">feature/*</text>
  <text x="85" y="90" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">branch + push</text>
  <text x="158" y="78" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="175" y="55" width="130" height="45" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="240" y="75" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fc6d26">Draft MR</text>
  <text x="240" y="90" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">WIP, no mergeable</text>
  <text x="313" y="78" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="330" y="55" width="130" height="45" rx="8" fill="#16213e" stroke="#554488" stroke-width="1.5"/>
  <text x="395" y="75" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#554488">Ready for Review</text>
  <text x="395" y="90" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">remove Draft:</text>
  <text x="468" y="78" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="485" y="55" width="130" height="45" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="550" y="75" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fc6d26">Code Review</text>
  <text x="550" y="90" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">comments + changes</text>
  <text x="623" y="78" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="640" y="55" width="140" height="45" rx="8" fill="#16213e" stroke="#e24329" stroke-width="2"/>
  <text x="710" y="75" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#e24329">Merged!</text>
  <text x="710" y="90" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">Closes #issue</text>
  <!-- MR Widget -->
  <rect x="40" y="130" width="720" height="110" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="1"/>
  <text x="400" y="155" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fc6d26">Merge Widget — Condiciones para Merge</text>
  <rect x="60" y="170" width="160" height="50" rx="5" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="140" y="190" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">✓ Pipeline green</text>
  <text x="140" y="207" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">Pipelines must succeed</text>
  <rect x="240" y="170" width="160" height="50" rx="5" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="320" y="190" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">✓ 2 approvals</text>
  <text x="320" y="207" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">Approval required</text>
  <rect x="420" y="170" width="160" height="50" rx="5" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="500" y="190" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">✓ Threads resolved</text>
  <text x="500" y="207" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">All threads resolved</text>
  <rect x="600" y="170" width="145" height="50" rx="5" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="672" y="190" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">✓ No conflicts</text>
  <text x="672" y="207" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">No merge conflicts</text>
  <!-- Merge methods -->
  <rect x="40" y="260" width="720" height="100" rx="8" fill="#16213e" stroke="#554488" stroke-width="1"/>
  <text x="400" y="283" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#554488">Metodos de Merge</text>
  <rect x="60" y="298" width="210" height="45" rx="5" fill="#1a1a2e" stroke="#fc6d26" stroke-width="1"/>
  <text x="165" y="318" text-anchor="middle" font-family="monospace" font-size="11" fill="#fc6d26">Merge Commit</text>
  <text x="165" y="335" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">git merge --no-ff</text>
  <rect x="290" y="298" width="210" height="45" rx="5" fill="#1a1a2e" stroke="#554488" stroke-width="1"/>
  <text x="395" y="318" text-anchor="middle" font-family="monospace" font-size="11" fill="#554488">Quick Merge</text>
  <text x="395" y="335" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">Fast-forward only</text>
  <rect x="520" y="298" width="225" height="45" rx="5" fill="#1a1a2e" stroke="#e24329" stroke-width="1.5"/>
  <text x="632" y="318" text-anchor="middle" font-family="monospace" font-size="11" fill="#e24329">Squash and Merge ★</text>
  <text x="632" y="335" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">all commits → 1 clean commit</text>
  <text x="400" y="372" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 04</text>
</svg>
