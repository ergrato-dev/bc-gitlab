<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="bold" fill="#e24329">GitLab API — REST vs GraphQL</text>
  <!-- REST -->
  <rect x="20" y="55" width="360" height="115" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="200" y="80" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fc6d26">REST API</text>
  <line x1="40" y1="90" x2="360" y2="90" stroke="#555" stroke-width="0.5"/>
  <text x="45" y="112" font-family="monospace" font-size="10" fill="#a0a0a0">GET /projects/:id → proyecto completo</text>
  <text x="45" y="130" font-family="monospace" font-size="10" fill="#a0a0a0">GET /projects/:id/issues → issues</text>
  <text x="45" y="148" font-family="monospace" font-size="10" fill="#a0a0a0">GET /projects/:id/pipelines → pipelines</text>
  <text x="45" y="165" font-family="monospace" font-size="9" fill="#7f8c8d">Over-fetching: cada endpoint devuelve TODOS los campos</text>
  <!-- GraphQL -->
  <rect x="420" y="55" width="360" height="115" rx="8" fill="#16213e" stroke="#554488" stroke-width="1.5"/>
  <text x="600" y="80" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#554488">GraphQL API</text>
  <line x1="440" y1="90" x2="740" y2="90" stroke="#555" stroke-width="0.5"/>
  <text x="445" y="112" font-family="monospace" font-size="10" fill="#a0a0a0">query { project { name, issues { title } } }</text>
  <text x="445" y="130" font-family="monospace" font-size="10" fill="#a0a0a0">1 peticion = exactamente los datos pedidos</text>
  <text x="445" y="148" font-family="monospace" font-size="10" fill="#a0a0a0">GraphiQL explorer en /-/graphql-explorer</text>
  <text x="445" y="165" font-family="monospace" font-size="9" fill="#7f8c8d">Sin over-fetching: solo los campos solicitados</text>
  <!-- Auth methods -->
  <rect x="40" y="195" width="720" height="80" rx="8" fill="#16213e" stroke="#555" stroke-width="1"/>
  <text x="400" y="218" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#7f8c8d">Metodos de Autenticacion</text>
  <rect x="60" y="232" width="155" height="30" rx="4" fill="#1a1a2e" stroke="#fc6d26" stroke-width="1"/>
  <text x="137" y="252" text-anchor="middle" font-family="monospace" font-size="9" fill="#fc6d26">PAT (Personal Access Token)</text>
  <rect x="230" y="232" width="155" height="30" rx="4" fill="#1a1a2e" stroke="#554488" stroke-width="1"/>
  <text x="307" y="252" text-anchor="middle" font-family="monospace" font-size="9" fill="#554488">Project/Group Token</text>
  <rect x="400" y="232" width="155" height="30" rx="4" fill="#1a1a2e" stroke="#e24329" stroke-width="1"/>
  <text x="477" y="252" text-anchor="middle" font-family="monospace" font-size="9" fill="#e24329">CI_JOB_TOKEN</text>
  <rect x="570" y="232" width="170" height="30" rx="4" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="655" y="252" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">OAuth2 (apps externas)</text>
  <text x="400" y="293" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 09</text>
</svg>
