<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="bold" fill="#e24329">Webhooks — Integracion con Sistemas Externos</text>
  <!-- Event sources -->
  <rect x="20" y="55" width="160" height="85" rx="6" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="100" y="78" text-anchor="middle" font-family="monospace" font-size="10" fill="#fc6d26">📤 GitLab Events</text>
  <text x="100" y="98" text-anchor="middle" font-family="monospace" font-size="8" fill="#a0a0a0">Push / Tag / Issue</text>
  <text x="100" y="113" text-anchor="middle" font-family="monospace" font-size="8" fill="#a0a0a0">MR / Pipeline / Job</text>
  <text x="100" y="128" text-anchor="middle" font-family="monospace" font-size="8" fill="#a0a0a0">Release / Deploy</text>
  <!-- Webhook POST -->
  <text x="190" y="95" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="210" y="55" width="170" height="85" rx="6" fill="#16213e" stroke="#e24329" stroke-width="2"/>
  <text x="295" y="78" text-anchor="middle" font-family="monospace" font-size="10" fill="#e24329">🔗 Webhook POST</text>
  <text x="295" y="98" text-anchor="middle" font-family="monospace" font-size="8" fill="#a0a0a0">HTTP POST JSON payload</text>
  <text x="295" y="113" text-anchor="middle" font-family="monospace" font-size="8" fill="#a0a0a0">X-Gitlab-Token: secret</text>
  <text x="295" y="128" text-anchor="middle" font-family="monospace" font-size="8" fill="#a0a0a0">Timeout: 10s</text>
  <!-- Endpoints -->
  <text x="390" y="95" font-family="monospace" font-size="14" fill="#555">→</text>
  <rect x="410" y="55" width="370" height="85" rx="6" fill="#16213e" stroke="#554488" stroke-width="1.5"/>
  <text x="595" y="78" text-anchor="middle" font-family="monospace" font-size="10" fill="#554488">📥 Destinos</text>
  <text x="490" y="100" font-family="monospace" font-size="9" fill="#a0a0a0">Slack/Discord, Jira, Teams</text>
  <text x="490" y="116" font-family="monospace" font-size="9" fill="#a0a0a0">CI/CD en otro proyecto (trigger)</text>
  <text x="490" y="132" font-family="monospace" font-size="9" fill="#a0a0a0">Webhook personalizado (Flask/Express)</text>
  <!-- Flow summary -->
  <rect x="40" y="170" width="720" height="110" rx="8" fill="#16213e" stroke="#555" stroke-width="1"/>
  <text x="400" y="195" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#7f8c8d">Flujo de un Webhook</text>
  <text x="60" y="218" font-family="monospace" font-size="10" fill="#fc6d26">1.</text><text x="80" y="218" font-family="monospace" font-size="9" fill="#a0a0a0">Developer hace git push</text>
  <text x="60" y="235" font-family="monospace" font-size="10" fill="#fc6d26">2.</text><text x="80" y="235" font-family="monospace" font-size="9" fill="#a0a0a0">GitLab detecta evento "Push" y busca webhooks configurados para ese proyecto</text>
  <text x="60" y="252" font-family="monospace" font-size="10" fill="#fc6d26">3.</text><text x="80" y="252" font-family="monospace" font-size="9" fill="#a0a0a0">GitLab envia POST con JSON payload + header X-Gitlab-Token a la URL configurada</text>
  <text x="60" y="269" font-family="monospace" font-size="10" fill="#fc6d26">4.</text><text x="80" y="269" font-family="monospace" font-size="9" fill="#a0a0a0">El receptor valida el token, procesa el payload y responde HTTP 200</text>
  <text x="400" y="293" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 09</text>
</svg>
