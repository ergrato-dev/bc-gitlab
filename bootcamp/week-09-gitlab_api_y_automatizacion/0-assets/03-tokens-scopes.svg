<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <rect width="800" height="280" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="bold" fill="#e24329">Tokens y Scopes — Personal Access Tokens</text>
  <!-- Token types -->
  <rect x="20" y="55" width="175" height="55" rx="6" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="107" y="78" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fc6d26">Personal Token</text>
  <text x="107" y="98" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">Settings → Access Tokens</text>
  <rect x="210" y="55" width="175" height="55" rx="6" fill="#16213e" stroke="#554488" stroke-width="1.5"/>
  <text x="297" y="78" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#554488">Project Token</text>
  <text x="297" y="98" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">Project → Settings → Access</text>
  <rect x="400" y="55" width="175" height="55" rx="6" fill="#16213e" stroke="#e24329" stroke-width="1.5"/>
  <text x="487" y="78" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#e24329">Group Token</text>
  <text x="487" y="98" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">Group → Settings → Access</text>
  <rect x="590" y="55" width="190" height="55" rx="6" fill="#16213e" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="685" y="78" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#7f8c8d">CI_JOB_TOKEN</text>
  <text x="685" y="98" text-anchor="middle" font-family="monospace" font-size="8" fill="#7f8c8d">Efimero en pipelines</text>
  <!-- Scopes -->
  <rect x="40" y="135" width="720" height="125" rx="8" fill="#16213e" stroke="#555" stroke-width="1"/>
  <text x="400" y="158" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e24329">Scopes (Principio de Minimo Privilegio)</text>
  <rect x="60" y="172" width="105" height="30" rx="4" fill="#1a1a2e" stroke="#e24329" stroke-width="1.5"/>
  <text x="112" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="#e24329">api</text>
  <rect x="175" y="172" width="105" height="30" rx="4" fill="#1a1a2e" stroke="#fc6d26" stroke-width="1"/>
  <text x="227" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="#fc6d26">read_api</text>
  <rect x="290" y="172" width="105" height="30" rx="4" fill="#1a1a2e" stroke="#554488" stroke-width="1"/>
  <text x="342" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="#554488">read_user</text>
  <rect x="405" y="172" width="145" height="30" rx="4" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="477" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">read_repository</text>
  <rect x="560" y="172" width="145" height="30" rx="4" fill="#1a1a2e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="632" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">write_repository</text>
  <text x="400" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">✓ Rotar cada 30-90 dias | ✓ Configurar expiracion | ✓ Auditoria periodica en /profile/personal_access_tokens</text>
  <text x="400" y="248" text-anchor="middle" font-family="monospace" font-size="9" fill="#c0392b">✗ NO hardcodear tokens en codigo fuente — usar variables de entorno</text>
  <text x="400" y="273" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 09</text>
</svg>
