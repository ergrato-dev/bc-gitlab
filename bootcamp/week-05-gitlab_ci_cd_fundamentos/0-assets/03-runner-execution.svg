<svg xmlns="http://www.w3.org/2000/svg" width="800" height="250" viewBox="0 0 800 250">
  <rect width="800" height="250" fill="#1a1a2e"/>
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e24329">GitLab Runner — Como Ejecuta los Jobs</text>

  <!-- Developer -->
  <rect x="20" y="60" width="140" height="60" rx="8" fill="#16213e" stroke="#554488" stroke-width="1.5"/>
  <text x="90" y="85" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#554488">git push</text>
  <text x="90" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">dispara pipeline</text>

  <text x="168" y="90" font-family="monospace" font-size="14" fill="#555">→</text>

  <!-- GitLab -->
  <rect x="185" y="60" width="140" height="60" rx="8" fill="#16213e" stroke="#e24329" stroke-width="1.5"/>
  <text x="255" y="85" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#e24329">GitLab CE</text>
  <text x="255" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">encola job</text>

  <text x="333" y="90" font-family="monospace" font-size="14" fill="#555">→</text>

  <!-- Polling arrow -->
  <text x="360" y="85" font-family="monospace" font-size="9" fill="#7f8c8d">polling</text>
  <text x="360" y="98" font-family="monospace" font-size="9" fill="#7f8c8d">cada ~3s</text>

  <!-- Runner -->
  <rect x="400" y="60" width="140" height="60" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="470" y="85" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fc6d26">GitLab Runner</text>
  <text x="470" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">toma job</text>

  <text x="548" y="90" font-family="monospace" font-size="14" fill="#555">→</text>

  <!-- Executor -->
  <rect x="565" y="60" width="130" height="60" rx="8" fill="#16213e" stroke="#554488" stroke-width="1.5"/>
  <text x="630" y="85" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#554488">Docker Executor</text>
  <text x="630" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">ejecuta job</text>

  <!-- Executor details -->
  <rect x="710" y="60" width="70" height="60" rx="8" fill="#16213e" stroke="#e24329" stroke-width="1"/>
  <text x="745" y="85" text-anchor="middle" font-family="monospace" font-size="10" fill="#e24329">Result</text>
  <text x="745" y="102" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">✓ / ✗</text>

  <!-- Runner types -->
  <rect x="60" y="150" width="680" height="80" rx="8" fill="#16213e" stroke="#555" stroke-width="1"/>
  <text x="400" y="175" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#7f8c8d">Tipos de Runner</text>

  <rect x="80" y="188" width="190" height="30" rx="5" fill="#1a1a2e" stroke="#fc6d26" stroke-width="1"/>
  <text x="175" y="208" text-anchor="middle" font-family="monospace" font-size="10" fill="#fc6d26">Shared (compartido)</text>

  <rect x="290" y="188" width="190" height="30" rx="5" fill="#1a1a2e" stroke="#554488" stroke-width="1"/>
  <text x="385" y="208" text-anchor="middle" font-family="monospace" font-size="10" fill="#554488">Group (grupo)</text>

  <rect x="500" y="188" width="225" height="30" rx="5" fill="#1a1a2e" stroke="#e24329" stroke-width="1"/>
  <text x="612" y="208" text-anchor="middle" font-family="monospace" font-size="10" fill="#e24329">Specific (proyecto)</text>

  <text x="400" y="243" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 05</text>
</svg>
