# ============================================
# Practica 01 — Primer Pipeline
# ============================================
# Copia este archivo como .gitlab-ci.yml en la
# raiz de tu proyecto, haz commit y push.
# ============================================

stages:
  - saludar

# ── Job basico ──
hola-mundo:
  stage: saludar
  script:
    - echo "Hola, CI/CD!"
    - date
    - whoami
    - echo "Pipeline ejecutado en $(uname -s)"

