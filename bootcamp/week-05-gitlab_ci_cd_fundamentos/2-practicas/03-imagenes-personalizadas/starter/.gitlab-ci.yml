# ============================================
# Practica 03 — Imagenes Docker en CI
# ============================================

stages:
  - build
  - test

# ── Job con Node.js ──
build-node:
  stage: build
  image: node:18-alpine
  script:
    - node --version
    - npm --version
    - echo "console.log('Hello from Bootcamp CI/CD');" > app.js
    - node app.js
  artifacts:
    paths:
      - app.js
    expire_in: 1 hour

# ── Job con Python ──
test-python:
  stage: test
  image: python:3.12-slim
  script:
    - python --version
    - pip --version
    - echo "print('Python en GitLab CI funciona correctamente')" > check.py
    - python check.py

