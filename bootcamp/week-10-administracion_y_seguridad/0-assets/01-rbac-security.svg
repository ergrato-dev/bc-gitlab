<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <rect width="800" height="280" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="bold" fill="#e24329">RBAC — Control de Acceso Basado en Roles</text>
  <!-- Guest -->
  <rect x="20" y="50" width="350" height="32" rx="6" fill="#16213e" stroke="#555" stroke-width="1"/>
  <text x="195" y="71" text-anchor="middle" font-family="monospace" font-size="11" fill="#7f8c8d">Guest (10) — Ver issues, comentar. NO ver codigo.</text>
  <rect x="20" y="85" width="350" height="32" rx="6" fill="#16213e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="195" y="106" text-anchor="middle" font-family="monospace" font-size="11" fill="#7f8c8d">Reporter (20) — Clonar, ver pipelines. NO push.</text>
  <rect x="20" y="120" width="350" height="32" rx="6" fill="#16213e" stroke="#554488" stroke-width="1"/>
  <text x="195" y="141" text-anchor="middle" font-family="monospace" font-size="11" fill="#554488">Developer (30) — Push, crear MRs, issues.</text>
  <rect x="20" y="155" width="350" height="32" rx="6" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="195" y="176" text-anchor="middle" font-family="monospace" font-size="11" fill="#fc6d26">Maintainer (40) — Merge, CI/CD, miembros, settings.</text>
  <rect x="20" y="190" width="350" height="32" rx="6" fill="#16213e" stroke="#e24329" stroke-width="2.5"/>
  <text x="195" y="211" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#e24329">Owner (50) — Control total, eliminar, transferir.</text>
  <!-- Security layers -->
  <rect x="420" y="50" width="360" height="210" rx="8" fill="#16213e" stroke="#555" stroke-width="1"/>
  <text x="600" y="73" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#7f8c8d">Capas de Seguridad</text>
  <text x="440" y="98" font-family="monospace" font-size="10" fill="#e24329">1. RBAC:</text><text x="510" y="98" font-family="monospace" font-size="9" fill="#a0a0a0">Roles + Protected Branches</text>
  <text x="440" y="118" font-family="monospace" font-size="10" fill="#e24329">2. MFA:</text><text x="510" y="118" font-family="monospace" font-size="9" fill="#a0a0a0">TOTP + Recovery Codes</text>
  <text x="440" y="138" font-family="monospace" font-size="10" fill="#e24329">3. IP Restriction:</text><text x="510" y="138" font-family="monospace" font-size="9" fill="#a0a0a0">Whitelist corporativa</text>
  <text x="440" y="158" font-family="monospace" font-size="10" fill="#e24329">4. SAST:</text><text x="510" y="158" font-family="monospace" font-size="9" fill="#a0a0a0">Codigo fuente (bandit, eslint, etc.)</text>
  <text x="440" y="178" font-family="monospace" font-size="10" fill="#e24329">5. Secret Detection:</text><text x="510" y="178" font-family="monospace" font-size="9" fill="#a0a0a0">Tokens y claves hardcodeadas</text>
  <text x="440" y="198" font-family="monospace" font-size="10" fill="#e24329">6. Dependency Scan:</text><text x="510" y="198" font-family="monospace" font-size="9" fill="#a0a0a0">CVEs en librerias</text>
  <text x="440" y="218" font-family="monospace" font-size="10" fill="#e24329">7. Compliance:</text><text x="510" y="218" font-family="monospace" font-size="9" fill="#a0a0a0">Pipeline obligatorio + MR approvals</text>
  <text x="440" y="238" font-family="monospace" font-size="10" fill="#e24329">8. Audit:</text><text x="510" y="238" font-family="monospace" font-size="9" fill="#a0a0a0">Event log + reportes via API</text>
  <text x="400" y="273" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 10</text>
</svg>
