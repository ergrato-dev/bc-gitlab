<svg xmlns="http://www.w3.org/2000/svg" width="800" height="240" viewBox="0 0 800 240">
  <rect width="800" height="240" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="bold" fill="#e24329">MFA — Multi-Factor Authentication</text>
  <!-- Flow -->
  <rect x="20" y="55" width="150" height="55" rx="6" fill="#16213e" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="95" y="78" text-anchor="middle" font-family="monospace" font-size="11" fill="#7f8c8d">Password</text>
  <text x="95" y="98" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">(algo que sabes)</text>
  <text x="178" y="82" font-family="monospace" font-size="16" fill="#555">+</text>
  <rect x="200" y="55" width="150" height="55" rx="6" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="275" y="78" text-anchor="middle" font-family="monospace" font-size="11" fill="#fc6d26">TOTP Code</text>
  <text x="275" y="98" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">(algo que tienes)</text>
  <text x="358" y="82" font-family="monospace" font-size="16" fill="#555">=</text>
  <rect x="380" y="55" width="170" height="55" rx="6" fill="#16213e" stroke="#e24329" stroke-width="2"/>
  <text x="465" y="78" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#e24329">Access Granted</text>
  <text x="465" y="98" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">2FA via TOTP app</text>
  <!-- Admin settings -->
  <rect x="60" y="135" width="680" height="85" rx="8" fill="#16213e" stroke="#555" stroke-width="1"/>
  <text x="400" y="160" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#7f8c8d">Admin Configuration</text>
  <text x="80" y="182" font-family="monospace" font-size="10" fill="#fc6d26">Enforce MFA:</text><text x="200" y="182" font-family="monospace" font-size="9" fill="#a0a0a0">Admin Area → Settings → General → Sign-up restrictions</text>
  <text x="80" y="200" font-family="monospace" font-size="10" fill="#fc6d26">Grace Period:</text><text x="200" y="200" font-family="monospace" font-size="9" fill="#a0a0a0">Horas antes de bloquear usuarios sin MFA</text>
  <text x="80" y="218" font-family="monospace" font-size="10" fill="#fc6d26">IP Whitelist:</text><text x="200" y="218" font-family="monospace" font-size="9" fill="#a0a0a0">Admin Area → Settings → Network → IP restrictions</text>
  <text x="400" y="233" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 10</text>
</svg>
