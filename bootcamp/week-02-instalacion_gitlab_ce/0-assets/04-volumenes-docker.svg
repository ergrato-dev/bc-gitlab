<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <rect width="800" height="200" fill="#1a1a2e"/>
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e24329">Volumenes Docker — Persistencia de Datos</text>

  <!-- Host -->
  <rect x="20" y="55" width="200" height="120" rx="8" fill="#16213e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="120" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#7f8c8d">Host</text>
  <text x="120" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">/var/lib/docker/volumes/</text>
  <line x1="40" y1="115" x2="200" y2="115" stroke="#555" stroke-width="0.5"/>
  <text x="120" y="135" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">bc-gitlab-config/</text>
  <text x="120" y="152" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">bc-gitlab-data/</text>
  <text x="120" y="169" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">bc-gitlab-logs/</text>

  <!-- Arrow -->
  <text x="240" y="118" text-anchor="middle" font-family="monospace" font-size="16" fill="#555">⟷</text>
  <text x="240" y="138" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">mount</text>

  <!-- Container -->
  <rect x="270" y="55" width="200" height="120" rx="8" fill="#16213e" stroke="#e24329" stroke-width="2"/>
  <text x="370" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e24329">Container</text>
  <text x="370" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">gitlab/gitlab-ce</text>
  <line x1="290" y1="115" x2="450" y2="115" stroke="#555" stroke-width="0.5"/>
  <text x="370" y="135" text-anchor="middle" font-family="monospace" font-size="9" fill="#e24329">/etc/gitlab → config</text>
  <text x="370" y="152" text-anchor="middle" font-family="monospace" font-size="9" fill="#e24329">/var/opt/gitlab → data</text>
  <text x="370" y="169" text-anchor="middle" font-family="monospace" font-size="9" fill="#e24329">/var/log/gitlab → logs</text>

  <!-- Without volumes -->
  <rect x="540" y="55" width="230" height="120" rx="8" fill="#16213e" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="655" y="80" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#c0392b">Sin volumenes</text>
  <text x="655" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#c0392b">docker compose down</text>
  <text x="655" y="125" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#c0392b">=</text>
  <text x="655" y="145" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#c0392b">DATOS PERDIDOS</text>
  <text x="655" y="162" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">repos, users, config...</text>

  <text x="400" y="192" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 02</text>
</svg>
