<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <rect width="800" height="420" fill="#1a1a2e"/>
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e24329">Docker Compose — Servicios del Bootcamp</text>

  <!-- Docker Host -->
  <rect x="250" y="50" width="300" height="30" rx="6" fill="#16213e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="400" y="70" text-anchor="middle" font-family="monospace" font-size="12" fill="#7f8c8d">Docker Engine (host)</text>

  <!-- gitlab container -->
  <rect x="40" y="100" width="180" height="130" rx="8" fill="#16213e" stroke="#e24329" stroke-width="2"/>
  <text x="130" y="125" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#e24329">gitlab</text>
  <text x="130" y="145" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">gitlab/gitlab-ce</text>
  <line x1="60" y1="155" x2="200" y2="155" stroke="#555" stroke-width="0.5"/>
  <text x="130" y="172" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">:80 → HTTP</text>
  <text x="130" y="188" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">:2224 → SSH</text>
  <text x="130" y="204" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">:9090 → metrics</text>

  <!-- runner container -->
  <rect x="260" y="100" width="180" height="130" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="2"/>
  <text x="350" y="125" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#fc6d26">gitlab-runner</text>
  <text x="350" y="145" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">gitlab/gitlab-runner</text>
  <line x1="280" y1="155" x2="420" y2="155" stroke="#555" stroke-width="0.5"/>
  <text x="350" y="172" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">executor: docker</text>
  <text x="350" y="188" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">docker.sock mount</text>
  <text x="350" y="204" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">:9252 → metrics</text>

  <!-- registry-cache -->
  <rect x="480" y="100" width="180" height="130" rx="8" fill="#16213e" stroke="#554488" stroke-width="2"/>
  <text x="570" y="125" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#554488">registry-cache</text>
  <text x="570" y="145" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">registry:2</text>
  <line x1="500" y1="155" x2="640" y2="155" stroke="#555" stroke-width="0.5"/>
  <text x="570" y="172" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">:5000 → cache</text>
  <text x="570" y="188" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">proxy: Docker Hub</text>

  <!-- monitoring containers (profile) -->
  <rect x="80" y="270" width="180" height="60" rx="8" fill="#16213e" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="170" y="295" text-anchor="middle" font-family="monospace" font-size="12" fill="#7f8c8d">prometheus</text>
  <text x="170" y="315" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">profile: monitoring</text>

  <rect x="300" y="270" width="180" height="60" rx="8" fill="#16213e" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="390" y="295" text-anchor="middle" font-family="monospace" font-size="12" fill="#7f8c8d">grafana</text>
  <text x="390" y="315" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">profile: monitoring</text>

  <!-- Volumes -->
  <rect x="580" y="260" width="180" height="140" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="1"/>
  <text x="670" y="285" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#fc6d26">volumes</text>
  <line x1="595" y1="295" x2="745" y2="295" stroke="#555" stroke-width="0.5"/>
  <text x="670" y="315" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">gitlab-config</text>
  <text x="670" y="332" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">gitlab-logs</text>
  <text x="670" y="349" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">gitlab-data</text>
  <text x="670" y="366" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">runner-config</text>
  <text x="670" y="383" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">...</text>

  <text x="400" y="375" text-anchor="middle" font-family="monospace" font-size="11" fill="#e24329">docker compose up -d</text>

  <text x="400" y="410" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 02</text>
</svg>
