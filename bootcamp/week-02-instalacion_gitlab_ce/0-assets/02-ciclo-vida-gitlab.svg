<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#1a1a2e"/>
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e24329">Ciclo de Vida de GitLab CE en Docker</text>

  <!-- Step 1: docker compose up -->
  <rect x="20" y="60" width="160" height="70" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="100" y="85" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#fc6d26">docker compose up -d</text>
  <text x="100" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">crea contenedor</text>
  <text x="100" y="120" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">monta volumenes</text>

  <text x="190" y="95" text-anchor="middle" font-family="monospace" font-size="16" fill="#555">→</text>

  <!-- Step 2: Config inicial -->
  <rect x="210" y="60" width="160" height="70" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="290" y="85" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#fc6d26">gitlab-ctl reconfigure</text>
  <text x="290" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">migra DB</text>
  <text x="290" y="120" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">compila assets</text>

  <text x="380" y="95" text-anchor="middle" font-family="monospace" font-size="16" fill="#555">→</text>

  <!-- Step 3: Ready -->
  <rect x="400" y="60" width="160" height="70" rx="8" fill="#16213e" stroke="#e24329" stroke-width="2"/>
  <text x="480" y="85" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#e24329">GitLab Ready</text>
  <text x="480" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">HTTP 200</text>
  <text x="480" y="120" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">~5-10 min</text>

  <!-- maintenance cycle -->
  <rect x="70" y="170" width="660" height="110" rx="8" fill="#16213e" stroke="#554488" stroke-width="1"/>
  <text x="400" y="195" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#554488">Operaciones de Mantenimiento</text>

  <rect x="90" y="210" width="140" height="50" rx="5" fill="#1a1a2e" stroke="#fc6d26" stroke-width="1"/>
  <text x="160" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#fc6d26">gitlab-ctl status</text>
  <text x="160" y="250" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">salud servicios</text>

  <rect x="250" y="210" width="140" height="50" rx="5" fill="#1a1a2e" stroke="#fc6d26" stroke-width="1"/>
  <text x="320" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#fc6d26">gitlab-ctl restart</text>
  <text x="320" y="250" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">reinicio seguro</text>

  <rect x="410" y="210" width="140" height="50" rx="5" fill="#1a1a2e" stroke="#e24329" stroke-width="1"/>
  <text x="480" y="228" text-anchor="middle" font-family="monospace" font-size="11" fill="#e24329">gitlab-backup create</text>
  <text x="480" y="250" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">backup completo</text>

  <rect x="570" y="210" width="140" height="50" rx="5" fill="#1a1a2e" stroke="#e24329" stroke-width="1"/>
  <text x="640" y="228" text-anchor="middle" font-family="monospace" font-size="11" fill="#e24329">gitlab-ctl tail</text>
  <text x="640" y="250" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f8c8d">logs en vivo</text>

  <text x="400" y="290" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 02</text>
</svg>
