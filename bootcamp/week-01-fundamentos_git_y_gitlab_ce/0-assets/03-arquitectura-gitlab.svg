<svg xmlns="http://www.w3.org/2000/svg" width="800" height="350" viewBox="0 0 800 350">
  <rect width="800" height="350" fill="#1a1a2e"/>

  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e24329">Arquitectura GitLab CE (vista Docker)</text>

  <!-- Nginx -->
  <rect x="320" y="50" width="160" height="50" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="2"/>
  <text x="400" y="75" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#fc6d26">nginx</text>
  <text x="400" y="92" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">:80 :443 → proxy reverso</text>

  <!-- Puma -->
  <line x1="400" y1="100" x2="400" y2="130" stroke="#fc6d26" stroke-width="2"/>
  <rect x="320" y="130" width="160" height="50" rx="8" fill="#16213e" stroke="#e24329" stroke-width="2"/>
  <text x="400" y="155" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#e24329">puma</text>
  <text x="400" y="172" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">Ruby on Rails (app)</text>

  <!-- Lines from Puma to services -->
  <line x1="360" y1="180" x2="150" y2="230" stroke="#554488" stroke-width="1.5"/>
  <line x1="400" y1="180" x2="400" y2="230" stroke="#554488" stroke-width="1.5"/>
  <line x1="440" y1="180" x2="650" y2="230" stroke="#554488" stroke-width="1.5"/>

  <!-- PostgreSQL -->
  <rect x="70" y="230" width="155" height="50" rx="8" fill="#16213e" stroke="#554488" stroke-width="2"/>
  <text x="147" y="255" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#554488">postgresql</text>
  <text x="147" y="272" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">usuarios, issues, MRs</text>

  <!-- Redis -->
  <rect x="322" y="230" width="155" height="50" rx="8" fill="#16213e" stroke="#554488" stroke-width="2"/>
  <text x="400" y="255" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#554488">redis</text>
  <text x="400" y="272" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">cache, colas, sesiones</text>

  <!-- Gitaly -->
  <rect x="575" y="230" width="155" height="50" rx="8" fill="#16213e" stroke="#554488" stroke-width="2"/>
  <text x="652" y="255" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#554488">gitaly</text>
  <text x="652" y="272" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">operaciones git (gRPC)</text>

  <!-- Sidekiq -->
  <rect x="322" y="290" width="155" height="40" rx="8" fill="#16213e" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="400" y="315" text-anchor="middle" font-family="monospace" font-size="13" fill="#7f8c8d">sidekiq</text>

  <!-- Legend -->
  <rect x="50" y="55" width="200" height="100" rx="6" fill="#16213e" stroke="#555" stroke-width="1"/>
  <text x="150" y="75" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Docker Container</text>
  <text x="150" y="95" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">gitlab/gitlab-ce</text>
  <text x="150" y="115" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">Omnibus empaquetado</text>
  <text x="150" y="140" text-anchor="middle" font-family="monospace" font-size="10" fill="#fc6d26">docker compose up -d</text>

  <text x="400" y="338" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 01</text>
</svg>
