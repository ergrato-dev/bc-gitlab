<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#1a1a2e"/>

  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e24329">Merge vs Rebase</text>

  <!-- MERGE section -->
  <rect x="30" y="55" width="355" height="28" rx="6" fill="#fc6d26" opacity="0.8"/>
  <text x="207" y="74" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#fff">MERGE — Fusion tradicional</text>

  <!-- Merge: Before -->
  <text x="207" y="110" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#7f8c8d">Antes</text>
  <!-- main branch -->
  <circle cx="130" cy="140" r="10" fill="#e24329"/>
  <text x="130" y="165" text-anchor="middle" font-family="monospace" font-size="11" fill="#e24329">C1 (main)</text>
  <line x1="140" y1="140" x2="260" y2="140" stroke="#e24329" stroke-width="2"/>
  <circle cx="270" cy="140" r="10" fill="#e24329"/>
  <text x="270" y="165" text-anchor="middle" font-family="monospace" font-size="11" fill="#e24329">C2</text>

  <!-- feature branch -->
  <circle cx="200" cy="190" r="10" fill="#554488"/>
  <text x="200" y="215" text-anchor="middle" font-family="monospace" font-size="11" fill="#554488">C3 (feature)</text>
  <line x1="200" y1="180" x2="200" y2="155" stroke="#554488" stroke-width="2"/>

  <!-- Merge arrow -->
  <text x="250" y="225" font-family="monospace" font-size="20" fill="#fc6d26">→</text>

  <!-- Merge: After -->
  <text x="310" y="110" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#7f8c8d">Despues</text>
  <circle cx="280" cy="270" r="10" fill="#e24329"/>
  <circle cx="340" cy="270" r="10" fill="#e24329"/>
  <line x1="290" y1="270" x2="330" y2="270" stroke="#e24329" stroke-width="2"/>
  <circle cx="310" cy="300" r="10" fill="#fc6d26"/>
  <text x="310" y="325" text-anchor="middle" font-family="monospace" font-size="11" fill="#fc6d26">Merge commit</text>
  <line x1="280" y1="280" x2="305" y2="295" stroke="#e24329" stroke-width="2"/>
  <line x1="340" y1="280" x2="315" y2="295" stroke="#554488" stroke-width="2"/>

  <!-- REBASE section -->
  <rect x="415" y="55" width="355" height="28" rx="6" fill="#554488" opacity="0.8"/>
  <text x="592" y="74" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#fff">REBASE — Historial lineal</text>

  <!-- Rebase: Before -->
  <text x="592" y="110" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#7f8c8d">Antes</text>
  <circle cx="520" cy="140" r="10" fill="#e24329"/>
  <text x="520" y="165" text-anchor="middle" font-family="monospace" font-size="11" fill="#e24329">C1 (main)</text>
  <line x1="530" y1="140" x2="650" y2="140" stroke="#e24329" stroke-width="2"/>
  <circle cx="660" cy="140" r="10" fill="#e24329"/>
  <text x="660" y="165" text-anchor="middle" font-family="monospace" font-size="11" fill="#e24329">C2</text>

  <circle cx="590" cy="190" r="10" fill="#554488"/>
  <text x="590" y="215" text-anchor="middle" font-family="monospace" font-size="11" fill="#554488">C3 (feature)</text>
  <line x1="590" y1="180" x2="590" y2="155" stroke="#554488" stroke-width="2"/>

  <text x="640" y="225" font-family="monospace" font-size="20" fill="#554488">→</text>

  <!-- Rebase: After -->
  <text x="700" y="110" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#7f8c8d">Despues</text>
  <circle cx="670" cy="270" r="10" fill="#e24329"/>
  <circle cx="730" cy="270" r="10" fill="#e24329"/>
  <line x1="680" y1="270" x2="720" y2="270" stroke="#e24329" stroke-width="2"/>
  <circle cx="760" cy="270" r="10" fill="#554488"/>
  <text x="760" y="295" text-anchor="middle" font-family="monospace" font-size="11" fill="#554488">C3'</text>
  <line x1="740" y1="270" x2="750" y2="270" stroke="#554488" stroke-width="2"/>

  <!-- Rules section -->
  <rect x="60" y="340" width="680" height="90" rx="8" fill="#16213e" stroke="#e24329" stroke-width="1.5"/>
  <text x="400" y="365" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e24329">Reglas</text>
  <text x="400" y="390" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#cccccc">Usa MERGE en ramas compartidas. Preserva el historial real.</text>
  <text x="400" y="410" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#cccccc">Usa REBASE solo en ramas locales antes de compartir. NUNCA rebasear ramas publicadas.</text>

  <text x="400" y="438" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 01</text>
</svg>
