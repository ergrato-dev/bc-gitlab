<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#1a1a2e"/>

  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e24329">Flujo de Trabajo Git — Dia a Dia</text>

  <!-- Step 1 -->
  <rect x="20" y="60" width="170" height="80" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="105" y="85" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fc6d26">1. git clone</text>
  <text x="105" y="110" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">clonar repositorio</text>
  <text x="105" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">una sola vez</text>

  <!-- Arrow -->
  <text x="200" y="103" text-anchor="middle" font-family="monospace" font-size="18" fill="#555">→</text>

  <!-- Step 2 -->
  <rect x="215" y="60" width="170" height="80" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="1.5"/>
  <text x="300" y="85" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fc6d26">2. git pull</text>
  <text x="300" y="110" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">bajar ultimos cambios</text>
  <text x="300" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">cada vez que empiezas</text>

  <!-- Arrow -->
  <text x="395" y="103" text-anchor="middle" font-family="monospace" font-size="18" fill="#555">→</text>

  <!-- Step 3 -->
  <rect x="410" y="60" width="170" height="80" rx="8" fill="#16213e" stroke="#554488" stroke-width="1.5"/>
  <text x="495" y="85" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#554488">3. Editar</text>
  <text x="495" y="110" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">modificar archivos</text>
  <text x="495" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">tu tarea actual</text>

  <!-- Arrow -->
  <text x="590" y="103" text-anchor="middle" font-family="monospace" font-size="18" fill="#555">→</text>

  <!-- Step 4 -->
  <rect x="605" y="60" width="175" height="80" rx="8" fill="#16213e" stroke="#e24329" stroke-width="1.5"/>
  <text x="692" y="85" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e24329">4. git add + commit</text>
  <text x="692" y="110" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">guardar snapshot</text>
  <text x="692" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">localmente</text>

  <!-- Arrow down -->
  <text x="402" y="165" text-anchor="middle" font-family="monospace" font-size="18" fill="#555">↓</text>

  <!-- Step 5 -->
  <rect x="265" y="175" width="270" height="70" rx="8" fill="#16213e" stroke="#e24329" stroke-width="2"/>
  <text x="400" y="200" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#e24329">5. git push</text>
  <text x="400" y="225" text-anchor="middle" font-family="monospace" font-size="11" fill="#a0a0a0">subir cambios a GitLab CE</text>

  <!-- Loop -->
  <text x="400" y="270" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#7f8c8d">Repetir pasos 2-5 durante la sesion de trabajo</text>

  <text x="400" y="290" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 01</text>
</svg>
