<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <rect width="800" height="320" fill="#1a1a2e"/>

  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e24329">Conectar SSH con GitLab CE en Docker</text>

  <!-- Host laptop -->
  <rect x="40" y="60" width="200" height="140" rx="8" fill="#16213e" stroke="#fc6d26" stroke-width="2"/>
  <text x="140" y="85" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fc6d26">Tu Maquina (Host)</text>
  <text x="140" y="110" text-anchor="middle" font-family="monospace" font-size="11" fill="#a0a0a0">~/.ssh/id_ed25519</text>
  <text x="140" y="130" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">clave privada</text>
  <text x="140" y="155" text-anchor="middle" font-family="monospace" font-size="11" fill="#fc6d26">git clone</text>
  <text x="140" y="175" text-anchor="middle" font-family="monospace" font-size="11" fill="#fc6d26">git push/pull</text>

  <!-- Arrow with SSH info -->
  <line x1="240" y1="130" x2="310" y2="130" stroke="#554488" stroke-width="2"/>
  <text x="275" y="120" text-anchor="middle" font-family="monospace" font-size="11" fill="#554488">SSH</text>
  <text x="275" y="145" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">puerto 2224</text>

  <!-- Docker container -->
  <rect x="320" y="60" width="220" height="140" rx="8" fill="#16213e" stroke="#e24329" stroke-width="2"/>
  <text x="430" y="85" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e24329">Docker Container</text>
  <text x="430" y="110" text-anchor="middle" font-family="monospace" font-size="11" fill="#a0a0a0">gitlab/gitlab-ce</text>
  <text x="430" y="135" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">SSH en puerto 22 (interno)</text>
  <text x="430" y="160" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">clave publica en GitLab</text>

  <!-- Arrow -->
  <line x1="540" y1="130" x2="580" y2="130" stroke="#554488" stroke-width="2"/>

  <!-- GitLab UI -->
  <rect x="590" y="60" width="180" height="140" rx="8" fill="#16213e" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="680" y="85" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#7f8c8d">GitLab CE UI</text>
  <text x="680" y="115" text-anchor="middle" font-family="monospace" font-size="11" fill="#a0a0a0">Preferences</text>
  <text x="680" y="135" text-anchor="middle" font-family="monospace" font-size="11" fill="#a0a0a0">→ SSH Keys</text>
  <text x="680" y="160" text-anchor="middle" font-family="monospace" font-size="10" fill="#7f8c8d">Pegar clave publica</text>

  <!-- Commands section -->
  <rect x="60" y="220" width="680" height="38" rx="6" fill="#16213e" stroke="#fc6d26" stroke-width="1"/>
  <text x="400" y="244" text-anchor="middle" font-family="monospace" font-size="12" fill="#fc6d26">docker compose exec gitlab grep 'Password:' /etc/gitlab/initial_root_password</text>

  <text x="400" y="285" text-anchor="middle" font-family="monospace" font-size="11" fill="#7f8c8d">ssh -T -p 2224 git@localhost → "Welcome to GitLab, @root!"</text>

  <text x="400" y="310" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bootcamp GitLab CE — Semana 01</text>
</svg>
